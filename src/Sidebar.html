<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SheetAPI Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; font-size: 13px; color: #333; padding: 16px; }
    h1 { font-size: 16px; color: #1a73e8; margin-bottom: 16px; }
    .section { background: #f8f9fa; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
    .section h2 { font-size: 13px; color: #666; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    .key-display { font-family: monospace; font-size: 11px; background: #e8eaed; padding: 6px 8px; border-radius: 4px; word-break: break-all; cursor: pointer; user-select: all; }
    .plan-badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-weight: bold; font-size: 12px; margin-bottom: 8px; }
    .plan-free { background: #fce4ec; color: #c62828; }
    .plan-pro { background: #e8f5e9; color: #1b5e20; }
    button { width: 100%; padding: 8px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; margin-top: 6px; }
    .btn-primary { background: #1a73e8; color: #fff; }
    .btn-secondary { background: #e8eaed; color: #333; }
    .btn-danger { background: #ea4335; color: #fff; }
    input[type="text"] { width: 100%; padding: 7px 10px; border: 1px solid #dadce0; border-radius: 6px; font-size: 13px; margin-top: 6px; }
    .status { padding: 8px; border-radius: 6px; margin-top: 8px; font-size: 12px; display: none; }
    .status.success { background: #e8f5e9; color: #1b5e20; display: block; }
    .status.error { background: #fce4ec; color: #c62828; display: block; }
    .hint { color: #888; font-size: 11px; margin-top: 4px; }
    a { color: #1a73e8; }
  </style>
</head>
<body>
  <h1>SheetAPI Settings</h1>
  <div class="section">
    <h2>Plan</h2>
    <span id="planBadge" class="plan-badge plan-free">FREE</span>
    <div class="hint">Free: 100 req/day, read-only | Pro: 10,000 req/day, read &amp; write</div>
  </div>
  <div class="section">
    <h2>API Key</h2>
    <div id="apiKey" class="key-display" onclick="copyKey()">Loading...</div>
    <p class="hint">Click to copy. Add ?key=YOUR_KEY to requests.</p>
    <button class="btn-danger" onclick="regenerate()">Regenerate Key</button>
  </div>
  <div class="section">
    <h2>Activate Pro</h2>
    <input type="text" id="licenseInput" placeholder="SHEETAPI_PRO_XXXXXXXX">
    <button class="btn-primary" onclick="activatePro()">Activate License</button>
    <div id="activateStatus" class="status"></div>
  </div>
  <div class="section">
    <h2>Documentation</h2>
    <button class="btn-secondary" onclick="openDocs()">View API Docs</button>
  </div>
  <script>
    google.script.run
      .withSuccessHandler(function(settings) {
        document.getElementById('apiKey').textContent = settings.apiKey;
        var badge = document.getElementById('planBadge');
        badge.textContent = settings.plan === 'pro' ? 'PRO' : 'FREE';
        badge.className = 'plan-badge ' + (settings.plan === 'pro' ? 'plan-pro' : 'plan-free');
      })
      .withFailureHandler(function(err) { document.getElementById('apiKey').textContent = 'Error: ' + err.message; })
      .getSettings();

    function copyKey() {
      var text = document.getElementById('apiKey').textContent;
      navigator.clipboard.writeText(text).catch(function() {
        var range = document.createRange(); range.selectNode(document.getElementById('apiKey'));
        window.getSelection().removeAllRanges(); window.getSelection().addRange(range);
      });
    }

    function regenerate() {
      if (!confirm('Regenerate API key? Old key stops working.')) return;
      google.script.run.withSuccessHandler(function(k) { document.getElementById('apiKey').textContent = k; }).regenerateApiKey();
    }

    function activatePro() {
      var key = document.getElementById('licenseInput').value.trim();
      var status = document.getElementById('activateStatus');
      if (!key) { status.textContent = 'Enter a license key.'; status.className = 'status error'; return; }
      google.script.run
        .withSuccessHandler(function(r) {
          status.textContent = r.message; status.className = 'status ' + (r.success ? 'success' : 'error');
          if (r.success) { document.getElementById('planBadge').textContent='PRO'; document.getElementById('planBadge').className='plan-badge plan-pro'; }
        })
        .activatePro(key);
    }

    function openDocs() { google.script.run.openDocs(); }
  </script>
</body>
</html>
